name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Compile GSettings schema
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin
          glib-compile-schemas schemas/

      - name: Package extension
        id: package
        run: |
          UUID="clipboard-khipu@ruddy.local"
          PKG_DIR="package/$UUID"
          mkdir -p "$PKG_DIR/schemas"
          cp dist/*.js "$PKG_DIR/"
          cp metadata.json stylesheet.css "$PKG_DIR/"
          cp schemas/org.gnome.shell.extensions.clipboard-khipu.gschema.xml "$PKG_DIR/schemas/"
          cp schemas/gschemas.compiled "$PKG_DIR/schemas/"
          ZIP_NAME="clipboard-khipu-${GITHUB_REF_NAME}.zip"
          (cd package && zip -qr "../$ZIP_NAME" "$UUID")
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.zip_name }}" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
